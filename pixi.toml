[workspace]
authors = ["Irian Ordaz <irian.ordaz@gmail.com>"]
channels = ["conda-forge"]
name = "Aviary"
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.14.4,<3.15"
openmdao = "*"
ruff = ">=0.15.11,<0.16"

[target.linux-64.dependencies]
cyipopt = ">=1.6.1,<2"
pyoptsparse = ">=2.15.0,<3"

[target.osx-arm64.dependencies]
cyipopt = ">=1.6.1,<2"
pyoptsparse = ">=2.15.0,<3"

[pypi-dependencies]
aviary = { path = ".", editable = true }
