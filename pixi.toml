[workspace]
authors = ["Irian Ordaz <irian.ordaz@gmail.com>"]
channels = ["conda-forge"]
name = "Aviary"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.14.3,<3.15"
openmdao = "*"
cyipopt = ">=1.7.0,<2"
pyoptsparse = ">=2.15.0,<3"
pip = ">=26.1.1,<27"
ipykernel = ">=7.2.0,<8"
basedpyright = ">=1.39.5,<2"

[pypi-dependencies]
aviary = { path = ".", editable = true }
hytank = { path = "./HyTank", editable = true }
coolprop = ">=7.2.0,<8"
