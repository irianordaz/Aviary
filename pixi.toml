[workspace]
authors = ["Irian Ordaz <irian.ordaz@gmail.com>"]
channels = ["conda-forge"]
name = "Aviary"
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[tasks]
pytest = "pytest --ignore=aviary"
testflo = "testflo --skip_dir aviary"

[dependencies]
python = ">=3.14.4,<3.15"
openmdao = "*"
ruff = ">=0.15.11,<0.16"
pyoptsparse = ">=2.14.5,<3"
cyipopt = ">=1.7.0,<2"
pytest = ">=9.0.3,<10"
testflo = ">=1.4.22,<2"

[target.linux-64.dependencies]
cyipopt = ">=1.6.1,<2"
pyoptsparse = ">=2.15.0,<3"

[target.osx-arm64.dependencies]
cyipopt = ">=1.6.1,<2"
pyoptsparse = ">=2.15.0,<3"

[pypi-dependencies]
aviary = { path = ".", editable = true }
